<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option F · GLOBE ENTRY — Orbital to Tactical</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Poppins:wght@800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
:root{
  --bg:#07080A; --pan:#0F1112; --line:#212629; --line2:#2E3538;
  --ink:#D8DDDE; --dim:#8A9396; --faint:#565E61;
  --red:#E5352B; --hot:#FF5F52; --ok:#57C785; --amber:#E8A33D;
  --mono:'IBM Plex Mono',monospace; --cond:'Barlow Condensed',sans-serif; --disp:'Poppins',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--cond);color:var(--ink)}
#globe-scene{position:fixed;inset:0;display:grid;place-items:center;transition:opacity 1.1s ease}
#globe-scene.gone{opacity:0;pointer-events:none}
canvas{cursor:grab}
canvas.dragging{cursor:grabbing}
/* chrome over globe */
.gtop{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;padding:18px 26px;gap:14px}
.eamp{font-family:var(--disp);font-weight:800;font-size:22px;color:#fff}
.eamp i{color:var(--red);font-style:normal}
.gtt b{display:block;font-weight:700;font-size:15px;letter-spacing:.22em}
.gtt span{font-family:var(--mono);font-size:8.5px;letter-spacing:.3em;color:var(--faint)}
.gsp{flex:1}
.gclock{font-family:var(--mono);font-size:14px;color:var(--dim)}
.gstat{position:fixed;left:26px;bottom:26px;font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.14em;line-height:2.1}
.gstat b{color:var(--dim);font-weight:500}
.gstat .g{color:var(--ok)}
.ghint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--faint);animation:hint 3s ease infinite}
@keyframes hint{50%{opacity:.35}}
.gcoord{position:fixed;right:26px;bottom:26px;font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.1em;text-align:right;line-height:2.1}
/* enter button near UAE */
#uaetag{position:fixed;pointer-events:none;opacity:0;transition:opacity .4s}
#uaetag.show{opacity:1;pointer-events:auto}
#uaetag .tagbox{transform:translate(18px,-50%);background:var(--pan);border:1px solid var(--line2);padding:10px 14px;cursor:pointer;transition:border-color .15s}
#uaetag .tagbox:hover{border-color:var(--red)}
#uaetag .t1{font-weight:700;font-size:15px;letter-spacing:.18em}
#uaetag .t2{font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;color:var(--ok);margin-top:3px}
#uaetag .t3{font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;color:var(--faint);margin-top:2px}
/* console scene (loaded in iframe) */
#console-scene{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity 1.1s ease .45s}
#console-scene.show{opacity:1;pointer-events:auto}
#console-scene iframe{width:100%;height:100%;border:none}
/* white flash on dive */
#flash{position:fixed;inset:0;background:#0D1114;opacity:0;pointer-events:none;transition:opacity .5s}
</style>
</head>
<body>
<div id="globe-scene">
  <canvas id="globe"></canvas>
  <div class="gtop">
    <span class="eamp">e<i>&amp;</i></span>
    <div class="gtt"><b>GLOBAL COMMAND</b><span>PHYSICAL INTELLIGENCE · ORBITAL VIEW</span></div>
    <div class="gsp"></div>
    <div class="gclock" id="gclk">18:42:07 GST</div>
  </div>
  <div class="gstat">
    NETWORK <b class="g">OPERATIONAL</b><br>
    REGIONS <b>1 ACTIVE · UAE</b><br>
    DOCKS <b>104</b> · AIRBORNE <b>17</b>
  </div>
  <div class="ghint">DRAG TO ROTATE · CLICK UAE TO ENTER THEATER</div>
  <div class="gcoord" id="gcoord">LAT +24.45 · LON +54.37<br>ALT 12,742 KM · ORBITAL</div>
  <div id="uaetag"><div class="tagbox" id="uaebtn">
    <div class="t1">UNITED ARAB EMIRATES</div>
    <div class="t2">■ GRID ONLINE · 104 DOCKS</div>
    <div class="t3">CLICK TO ENTER THEATER</div>
  </div></div>
</div>
<div id="flash"></div>
<div id="console-scene"><iframe data-src="option-d-lattice.html" id="cframe"></iframe></div>

<script>
const canvas=document.getElementById('globe'),ctx=canvas.getContext('2d');
let W,H,R;
function size(){W=innerWidth;H=innerHeight;canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);R=Math.min(W,H)*0.36}
size();addEventListener('resize',size);
const UAE=[54.37,24.45];
let land=null,borders=null;
const proj=d3.geoOrthographic();
const path=d3.geoPath(proj,ctx);
let rot=[-30,-15],scale=1,autospin=true,diving=false;
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json()).then(w=>{
  land=topojson.feature(w,w.objects.countries);
  borders=topojson.mesh(w,w.objects.countries,(a,b)=>a!==b);
});
const graticule=d3.geoGraticule10();
function draw(){
  proj.rotate(rot).scale(R*scale).translate([W/2,H/2]);
  ctx.clearRect(0,0,W,H);
  // space: faint stars
  ctx.save();
  for(let i=0;i<90;i++){const x=(i*97.3)%W,y=(i*211.7)%H;ctx.fillStyle=`rgba(200,215,220,${0.05+(i%5)*0.02})`;ctx.fillRect(x,y,1,1)}
  ctx.restore();
  const r=R*scale;
  // atmosphere
  const g=ctx.createRadialGradient(W/2,H/2,r*0.95,W/2,H/2,r*1.22);
  g.addColorStop(0,'rgba(120,150,160,0.14)');g.addColorStop(0.5,'rgba(90,120,130,0.05)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(W/2,H/2,r*1.25,0,7);ctx.fill();
  // ocean disc
  ctx.beginPath();ctx.arc(W/2,H/2,r,0,7);
  const og=ctx.createRadialGradient(W/2-r*0.35,H/2-r*0.4,r*0.1,W/2,H/2,r);
  og.addColorStop(0,'#131A1E');og.addColorStop(1,'#090C0E');
  ctx.fillStyle=og;ctx.fill();
  ctx.strokeStyle='rgba(140,155,160,0.25)';ctx.lineWidth=1;ctx.stroke();
  // graticule
  ctx.beginPath();path(graticule);ctx.strokeStyle='rgba(140,155,160,0.07)';ctx.lineWidth=.5;ctx.stroke();
  if(land){
    ctx.beginPath();path(land);ctx.fillStyle='#1A2124';ctx.fill();
    ctx.strokeStyle='rgba(160,175,180,0.28)';ctx.lineWidth=.6;ctx.stroke();
    ctx.beginPath();path(borders);ctx.strokeStyle='rgba(140,155,160,0.12)';ctx.lineWidth=.4;ctx.stroke();
  }
  // UAE beacon
  const p=proj(UAE);
  const visible=d3.geoDistance([-rot[0],-rot[1]],UAE)<Math.PI/2;
  const tag=document.getElementById('uaetag');
  if(p&&visible){
    const t=Date.now()/1000;
    const pr=6+((t%2.6)/2.6)*26*Math.min(scale,1.6);
    ctx.beginPath();ctx.arc(p[0],p[1],pr,0,7);ctx.strokeStyle=`rgba(229,53,43,${0.8*(1-(t%2.6)/2.6)})`;ctx.lineWidth=1.2;ctx.stroke();
    ctx.beginPath();ctx.arc(p[0],p[1],4,0,7);ctx.fillStyle='#E5352B';ctx.fill();
    ctx.beginPath();ctx.arc(p[0],p[1],7.5,0,7);ctx.strokeStyle='rgba(229,53,43,.6)';ctx.lineWidth=1;ctx.stroke();
    if(!diving){tag.classList.add('show');tag.style.left=p[0]+'px';tag.style.top=p[1]+'px';}
  }else tag.classList.remove('show');
  if(autospin&&!diving)rot[0]+=0.045;
  requestAnimationFrame(draw);
}
draw();
// drag
let drag=false,last=null;
canvas.addEventListener('pointerdown',e=>{drag=true;last=[e.clientX,e.clientY];autospin=false;canvas.classList.add('dragging')});
addEventListener('pointermove',e=>{if(!drag)return;
rot[0]+=(e.clientX-last[0])*0.25/scale;rot[1]-=(e.clientY-last[1])*0.25/scale;
rot[1]=Math.max(-80,Math.min(80,rot[1]));last=[e.clientX,e.clientY];
document.getElementById('gcoord').innerHTML=`LAT ${(-rot[1]).toFixed(2)} · LON ${(-rot[0]).toFixed(2)}<br>ALT 12,742 KM · ORBITAL`;});
addEventListener('pointerup',()=>{drag=false;canvas.classList.remove('dragging');setTimeout(()=>{if(!diving)autospin=true},2500)});
// clock
setInterval(()=>{document.getElementById('gclk').textContent=new Date().toLocaleTimeString('en-GB',{hour12:false})+' GST'},1000);
// dive
function dive(){
  if(diving)return;diving=true;autospin=false;
  document.getElementById('uaetag').classList.remove('show');
  document.getElementById('cframe').src=document.getElementById('cframe').dataset.src;
  const r0=[...rot],s0=scale,t0=performance.now(),DUR=2600;
  const rT=[-UAE[0],-UAE[1]];
  const alt=document.getElementById('gcoord');
  function step(now){
    let k=Math.min(1,(now-t0)/DUR);
    const e=1-Math.pow(1-k,3); // ease-out cubic
    rot[0]=r0[0]+(rT[0]-r0[0])*e;
    rot[1]=r0[1]+(rT[1]-r0[1])*e;
    scale=s0*Math.pow(34,e*e); // accelerate zoom late
    alt.innerHTML=`LAT ${(-rot[1]).toFixed(2)} · LON ${(-rot[0]).toFixed(2)}<br>ALT ${Math.max(2,Math.round(12742*(1-e*e)))} KM · DESCENT`;
    if(k<1){requestAnimationFrame(step)}
    else{
      document.getElementById('globe-scene').classList.add('gone');
      document.getElementById('console-scene').classList.add('show');
    }
  }
  requestAnimationFrame(step);
}
document.getElementById('uaebtn').addEventListener('click',dive);
canvas.addEventListener('click',e=>{
  const p=proj(UAE);if(!p)return;
  if(Math.hypot(e.clientX-p[0],e.clientY-p[1])<40)dive();
});
</script>
</body>
</html>
